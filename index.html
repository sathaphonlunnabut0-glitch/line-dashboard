<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LINE Backup Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 30px;
    }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }

    img {
      margin-top: 8px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h1>LINE Backup Dashboard</h1>

<div id="authSection">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <br>
  <button id="registerBtn">Register</button>
  <button id="loginBtn">Login</button>
  <p id="status"></p>
</div>

<div id="dashboard" style="display:none;">

  <div class="card">
    <h3>User Info</h3>
    <p id="userEmail"></p>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="card">
    <h3>Backup Files</h3>
    <p>จำนวนไฟล์: <span id="fileCount">0</span></p>
    <div id="fileList"></div>
  </div>

</div>

<script>
  const { createClient } = supabase

  const supabaseClient = createClient(
    "https://sghljaxzdbiwfihkjvdp.supabase.co",
    "sb_publishable_zI0MUYAb5ZeYIEvtwl4D3A_2VpPYqjk"
  )

  // โหลด session ตอนเปิดเว็บ
  window.addEventListener("load", async () => {
    const { data: { session } } = await supabaseClient.auth.getSession()
    if (session) showDashboard(session.user)
  })

  // REGISTER
  document.getElementById("registerBtn").onclick = async () => {
    const emailInput = document.getElementById("email").value
    const passwordInput = document.getElementById("password").value

    const { error } = await supabaseClient.auth.signUp({
      email: emailInput,
      password: passwordInput
    })

    document.getElementById("status").innerText =
      error ? error.message : "สมัครสำเร็จ!"
  }

  // LOGIN
  document.getElementById("loginBtn").onclick = async () => {
    const emailInput = document.getElementById("email").value
    const passwordInput = document.getElementById("password").value

    const { error } = await supabaseClient.auth.signInWithPassword({
      email: emailInput,
      password: passwordInput
    })

    if (error) {
      document.getElementById("status").innerText = error.message
    } else {
      location.reload()
    }
  }

  // แสดง Dashboard
  function showDashboard(user) {
    document.getElementById("authSection").style.display = "none"
    document.getElementById("dashboard").style.display = "block"
    document.getElementById("userEmail").innerText =
      "Email: " + user.email

    loadFiles(user)
  }

  // โหลดไฟล์จาก Storage
  async function loadFiles(user) {

    const folderName = user.id

    const { data, error } = await supabaseClient
      .storage
      .from("line-files")
      .list(folderName, { limit: 100 })

    if (error) {
      console.log(error)
      return
    }

    document.getElementById("fileCount").innerText = data.length

    const fileList = document.getElementById("fileList")
    fileList.innerHTML = ""

    if (data.length === 0) {
      fileList.innerHTML = "<p>ยังไม่มีไฟล์</p>"
      return
    }

    data.forEach(file => {

      const filePath = `${folderName}/${file.name}`

      const { data: publicUrl } = supabaseClient
        .storage
        .from("line-files")
        .getPublicUrl(filePath)

      fileList.innerHTML += `
        <div style="margin-bottom:15px;">
          <p>${file.name}</p>
          <img src="${publicUrl.publicUrl}" width="200">
          <br>
          <a href="${publicUrl.publicUrl}" download>
            <button>Download</button>
          </a>
        </div>
      `
    })
  }

  // LOGOUT
  document.getElementById("logoutBtn").onclick = async () => {
    await supabaseClient.auth.signOut()
    location.reload()
  }
</script>

</body>
</html>
