<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LINE Backup Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 30px;
    }

    input {
      padding: 8px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>LINE Backup Dashboard</h1>

<input type="email" id="email" placeholder="Enter email">
<button id="loginBtn">Login</button>

<p id="status"></p>

<script>
  const { createClient } = supabase

  const supabaseClient = createClient(
    "https://sghljaxzdbiwfihkjvdp.supabase.co",
    "sb_publishable_zI0MUYAb5ZeYIEvtwl4D3A_2VpPYqjk"
  )

  // ✅ เช็ค session ตอนโหลดหน้า
  window.addEventListener("load", async () => {
    const { data: { session } } = await supabaseClient.auth.getSession()

    if (session) {
      document.getElementById("status").innerText =
        "Login สำเร็จ: " + session.user.email
    }
  })

  // ปุ่ม login
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("email").value

    const { error } = await supabaseClient.auth.signInWithOtp({
      email: email
    })

    if (error) {
      document.getElementById("status").innerText = error.message
    } else {
      document.getElementById("status").innerText =
        "Check your email for login link!"
    }
  })
</script>

</body>
</html>
