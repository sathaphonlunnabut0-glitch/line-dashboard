<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINE Backup Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
  padding: 15px;
}

h1 { font-size: 22px; }

input {
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
  width: 100%;
  box-sizing: border-box;
}

button {
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #22c55e;
  color: white;
  cursor: pointer;
  margin-top: 5px;
  width: 100%;
}

.delete-btn {
  background: #ef4444;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 12px;
  margin-top: 15px;
}

.file-card {
  background: #334155;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 12px;
}

img {
  width: 100%;
  max-width: 250px;
  border-radius: 8px;
  margin-top: 8px;
}

.actions {
  display: flex;
  gap: 10px;
  margin-top: 8px;
}

.actions button {
  flex: 1;
}
</style>
</head>
<body>

<h1>LINE Backup Dashboard</h1>

<div id="authSection">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="registerBtn">Register</button>
  <button id="loginBtn">Login</button>
  <p id="status"></p>
</div>

<div id="dashboard" style="display:none;">

  <div class="card">
    <p id="userEmail"></p>
    <button id="logoutBtn">Logout</button>
  </div>

  <div class="card">
    <h3>Backup Files</h3>
    <p>จำนวนไฟล์: <span id="fileCount">0</span></p>
    <div id="fileList"></div>
  </div>

</div>

<script>
const { createClient } = supabase

const supabaseClient = createClient(
  "https://sghljaxzdbiwfihkjvdp.supabase.co",
  "sb_publishable_zI0MUYAb5ZeYIEvtwl4D3A_2VpPYqjk"
)

let currentUser = null

window.addEventListener("load", async () => {
  const { data: { session } } = await supabaseClient.auth.getSession()
  if (session) showDashboard(session.user)
})

document.getElementById("registerBtn").onclick = async () => {
  const { error } = await supabaseClient.auth.signUp({
    email: email.value,
    password: password.value
  })
  status.innerText = error ? error.message : "สมัครสำเร็จ!"
}

document.getElementById("loginBtn").onclick = async () => {
  const { error } = await supabaseClient.auth.signInWithPassword({
    email: email.value,
    password: password.value
  })
  if (error) status.innerText = error.message
  else location.reload()
}

function showDashboard(user) {
  currentUser = user
  authSection.style.display = "none"
  dashboard.style.display = "block"
  userEmail.innerText = "Email: " + user.email
  loadAllFiles()
}

async function loadAllFiles() {
  const fileList = document.getElementById("fileList")
  fileList.innerHTML = "กำลังโหลด..."

  let totalFiles = 0
  fileList.innerHTML = ""

  const folders = ["image", "video", "audio", "file"]

  for (const folder of folders) {
    const { data, error } = await supabaseClient
      .storage
      .from("line-files")
      .list(folder)

    if (error || !data) continue

    data.forEach(file => {
      totalFiles++

      const fullPath = folder + "/" + file.name

      const { data: publicUrl } = supabaseClient
        .storage
        .from("line-files")
        .getPublicUrl(fullPath)

      const isImage = file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)

      fileList.innerHTML += `
        <div class="file-card">
          <p>${fullPath}</p>
          ${isImage ? `<img src="${publicUrl.publicUrl}">` : `<p>📄 File</p>`}
          <div class="actions">
            <a href="${publicUrl.publicUrl}" target="_blank">
              <button>Download</button>
            </a>
            <button class="delete-btn" onclick="deleteFile('${fullPath}')">
              Delete
            </button>
          </div>
        </div>
      `
    })
  }

  document.getElementById("fileCount").innerText = totalFiles

  if (totalFiles === 0) {
    fileList.innerHTML = "ยังไม่มีไฟล์"
  }
}

async function deleteFile(path) {
  if (!confirm("ต้องการลบไฟล์นี้ใช่ไหม?")) return

  const { error } = await supabaseClient
    .storage
    .from("line-files")
    .remove([path])

  if (error) {
    alert("ลบไม่สำเร็จ")
  } else {
    loadAllFiles()
  }
}

logoutBtn.onclick = async () => {
  await supabaseClient.auth.signOut()
  location.reload()
}
</script>

</body>
</html>
