<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LINE Backup Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 30px;
    }

    input {
      padding: 8px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>LINE Backup Dashboard</h1>

<input type="email" id="email" placeholder="Enter email">
<button id="loginBtn">Login</button>

<p id="status"></p>

<script>
  const { createClient } = supabase

  const supabaseClient = createClient(
    "https://sghljaxzdbiwfihkjvdp.supabase.co",
    "sb_publishable_zI0MUYAb5ZeYIEvtwl4D3A_2VpPYqjk"
  )

  const status = document.getElementById("status")
  const emailInput = document.getElementById("email")
  const loginBtn = document.getElementById("loginBtn")

  // 🔥 ตรวจสอบ session ตอนโหลดหน้า
  window.addEventListener("load", async () => {
    const { data } = await supabaseClient.auth.getSession()

    if (data.session) {
      showDashboard()
    }
  })

  // 🔥 ปุ่ม Login
  loginBtn.addEventListener("click", async () => {
    const email = emailInput.value

    const { error } = await supabaseClient.auth.signInWithOtp({
      email: email
    })

    if (error) {
      status.innerText = error.message
    } else {
      status.innerText = "Check your email for login link!"
    }
  })

  // 🔥 เมื่อ Login สำเร็จ
  function showDashboard() {
    status.innerText = "Login successful!"
    emailInput.style.display = "none"
    loginBtn.style.display = "none"

    loadFiles()
  }

  // 🔥 ดึงไฟล์จาก Supabase Storage
  async function loadFiles() {
    const { data, error } = await supabaseClient.storage
      .from("YOUR_BUCKET_NAME")   // 🔥 ใส่ชื่อ bucket ของคุณตรงนี้
      .list("", { limit: 100 })

    if (error) {
      status.innerText = error.message
      return
    }

    status.innerText = "Found " + data.length + " files"

    data.forEach(file => {
      const link = document.createElement("a")
      link.href = supabaseClient.storage
        .from("YOUR_BUCKET_NAME")
        .getPublicUrl(file.name).data.publicUrl
      link.innerText = file.name
      link.style.display = "block"
      link.style.color = "#22c55e"
      link.target = "_blank"
      document.body.appendChild(link)
    })
  }
</script>

</body>
</html>
