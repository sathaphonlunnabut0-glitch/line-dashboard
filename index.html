<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>LINE Backup Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 30px;
    }

    input {
      padding: 8px;
      margin: 5px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      color: white;
      cursor: pointer;
      margin: 5px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 15px;
    }
  </style>
</head>
<body>

<h1>LINE Backup Dashboard</h1>

<div id="authSection">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <br>
  <button id="registerBtn">Register</button>
  <button id="loginBtn">Login</button>
  <p id="status"></p>
</div>

<div id="dashboard" style="display:none;">
  <div class="card">
    <h3>User Info</h3>
    <p id="userEmail"></p>
    <button id="logoutBtn">Logout</button>
  </div>
</div>

<script>
  const { createClient } = supabase

  const supabaseClient = createClient(
    "https://sghljaxzdbiwfihkjvdp.supabase.co",
    "sb_publishable_zI0MUYAb5ZeYIEvtwl4D3A_2VpPYqjk"
  )

  window.addEventListener("load", async () => {
    const { data: { session } } = await supabaseClient.auth.getSession()
    if (session) showDashboard(session.user)
  })

  // REGISTER
  document.getElementById("registerBtn").onclick = async () => {
    const emailInput = document.getElementById("email").value
    const passwordInput = document.getElementById("password").value

    const { error } = await supabaseClient.auth.signUp({
      email: emailInput,
      password: passwordInput
    })

    document.getElementById("status").innerText =
      error ? error.message : "สมัครสำเร็จ!"
  }

  // LOGIN
  document.getElementById("loginBtn").onclick = async () => {
    const emailInput = document.getElementById("email").value
    const passwordInput = document.getElementById("password").value

    const { error } = await supabaseClient.auth.signInWithPassword({
      email: emailInput,
      password: passwordInput
    })

    if (error) {
      document.getElementById("status").innerText = error.message
    } else {
      location.reload()
    }
  }

  function showDashboard(user) {
    document.getElementById("authSection").style.display = "none"
    document.getElementById("dashboard").style.display = "block"
    document.getElementById("userEmail").innerText =
      "Email: " + user.email
  }

  document.getElementById("logoutBtn").onclick = async () => {
    await supabaseClient.auth.signOut()
    location.reload()
  }
</script>

</body>
</html>
